name: iOS simulator build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'iosApp/**'
      - 'shared/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/ios-simulator-build.yml'

jobs:
  build-ios-simulator:
    name: Build Quri for iPhone simulator
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build iOS simulator app
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath iosApp/build/DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Package simulator app
        run: |
          cd iosApp/build/DerivedData/Build/Products/Debug-iphonesimulator
          ditto -c -k --sequesterRsrc --keepParent iosApp.app quri-ios-simulator-app.zip

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: quri-ios-simulator-app
          path: iosApp/build/DerivedData/Build/Products/Debug-iphonesimulator/quri-ios-simulator-app.zip
          if-no-files-found: error
